- name: Fix Info.plist and icons
  script: |
    /usr/libexec/PlistBuddy -c "Delete :CFBundleIconName" HafaUp/Info.plist 2>/dev/null
    /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" HafaUp/Info.plist
    /usr/libexec/PlistBuddy -c "Delete :CFBundleIcons" HafaUp/Info.plist 2>/dev/null
    /usr/libexec/PlistBuddy -c "Add :CFBundleIcons dict" HafaUp/Info.plist
    /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon dict" HafaUp/Info.plist
    /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconName string AppIcon" HafaUp/Info.plist
    /usr/libexec/PlistBuddy -c "Delete :CFBundleIcons~ipad" HafaUp/Info.plist 2>/dev/null
    /usr/libexec/PlistBuddy -c "Add :CFBundleIcons~ipad dict" HafaUp/Info.plist
    /usr/libexec/PlistBuddy -c "Add :CFBundleIcons~ipad:CFBundlePrimaryIcon dict" HafaUp/Info.plist
    /usr/libexec/PlistBuddy -c "Add :CFBundleIcons~ipad:CFBundlePrimaryIcon:CFBundleIconName string AppIcon" HafaUp/Info.plist

    python3 -m pip install --no-cache-dir Pillow

    python3 << 'PYEOF'
    from PIL import Image
    import os

    folder = "HafaUp/Assets.xcassets/AppIcon.appiconset"
    for f in os.listdir(folder):
        if f.lower().endswith(".png"):
            path = os.path.join(folder, f)
            img = Image.open(path).convert("RGBA")
            bg = Image.new("RGB", img.size, (255, 255, 255))
            bg.paste(img, mask=img.getchannel("A"))
            bg.save(path, "PNG")
            check = Image.open(path)
            print(f"Fixed {f}: mode={check.mode}, size={check.size}")
    PYEOF

    cd "$CM_BUILD_DIR"
