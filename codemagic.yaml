workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60

    integrations:
      app_store_connect: Codemagic

    environment:
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.app.captainguam

    scripts:
      - name: Install CocoaPods
        script: |
          pod install

      - name: Setup signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files com.app.captainguam \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles --project HafaUp.xcodeproj

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "HafaUp.xcworkspace" \
            --scheme "HafaUp"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
