workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install CocoaPods
        script: |
          pod install || true
      - name: Setup signing
        script: |
          keychain initialize
          openssl genrsa -out /tmp/cert_key.pem 2048
          export CERTIFICATE_PRIVATE_KEY="$(cat /tmp/cert_key.pem)"
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --save || true
          app-store-connect fetch-signing-files com.app.captainguam \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Archive iOS
        script: |
          set -o pipefail
          xcodebuild \
            -workspace HafaUp.xcworkspace \
            -scheme HafaUp \
            -destination 'generic/platform=iOS' \
            -archivePath "$CM_BUILD_DIR/build/ios/xcarchive/HafaUp.xcarchive" \
            archive \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEVELOPMENT_TEAM=GCFCJUMRPV \
            CODE_SIGN_STYLE=Automatic \
            -allowProvisioningUpdates
      - name: Export IPA
        script: |
          cat > /tmp/export.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>GCFCJUMRPV</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/build/ios/xcarchive/HafaUp.xcarchive" \
            -exportPath "$CM_BUILD_DIR/build/ios/ipa" \
            -exportOptionsPlist /tmp/export.plist \
            -allowProvisioningUpdates
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
