workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    integrations:
      app_store_connect: Codemagic
    environment:
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.app.captainguam
    scripts:
      - name: Install CocoaPods
        script: |
          pod install
      - name: Setup signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files com.app.captainguam \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles --project HafaUp.xcodeproj
      - name: Fix plist icons and storyboards
        script: |
          /usr/libexec/PlistBuddy -c "Delete :CFBundleIconName" HafaUp/Info.plist 2>/dev/null
          /usr/libexec/PlistBuddy -c "Add :CFBundleIconName string AppIcon" HafaUp/Info.plist
          /usr/libexec/PlistBuddy -c "Delete :CFBundleIcons" HafaUp/Info.plist 2>/dev/null
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons dict" HafaUp/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon dict" HafaUp/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconName string AppIcon" HafaUp/Info.plist
          /usr/libexec/PlistBuddy -c "Delete :CFBundleIcons~ipad" HafaUp/Info.plist 2>/dev/null
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons~ipad dict" HafaUp/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons~ipad:CFBundlePrimaryIcon dict" HafaUp/Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleIcons~ipad:CFBundlePrimaryIcon:CFBundleIconName string AppIcon" HafaUp/Info.plist
          python3 -m pip install --no-cache-dir Pillow
          python3 - << 'PYEOF'
          from PIL import Image
          import os, json
          folder = "HafaUp/Assets.xcassets/AppIcon.appiconset"
          preferred = os.path.join(folder, "icon-1024.png")
          if os.path.exists(preferred):
              src = preferred
          else:
              src = None
              for f in os.listdir(folder):
                  if f.lower().endswith(".png"):
                      src = os.path.join(folder, f)
                      break
          if not src:
              print("ERROR: No source icon found")
              exit(1)
          print(f"Using source: {src}")
          img = Image.open(src).convert("RGBA")
          sizes = [
              ("iphone", "20x20", "2x", 40, "iphone-40"),
              ("iphone", "20x20", "3x", 60, "iphone-60"),
              ("iphone", "29x29", "2x", 58, "iphone-58"),
              ("iphone", "29x29", "3x", 87, "iphone-87"),
              ("iphone", "40x40", "2x", 80, "iphone-80"),
              ("iphone", "40x40", "3x", 120, "iphone-120"),
              ("iphone", "60x60", "2x", 120, "iphone-120x2"),
              ("iphone", "60x60", "3x", 180, "iphone-180"),
              ("ipad", "20x20", "1x", 20, "ipad-20"),
              ("ipad", "20x20", "2x", 40, "ipad-40"),
              ("ipad", "29x29", "1x", 29, "ipad-29"),
              ("ipad", "29x29", "2x", 58, "ipad-58"),
              ("ipad", "40x40", "1x", 40, "ipad-40x1"),
              ("ipad", "40x40", "2x", 80, "ipad-80"),
              ("ipad", "76x76", "1x", 76, "ipad-76"),
              ("ipad", "76x76", "2x", 152, "ipad-152"),
              ("ipad", "83.5x83.5", "2x", 167, "ipad-167"),
              ("ios-marketing", "1024x1024", "1x", 1024, "marketing-1024"),
          ]
          images = []
          for idiom, size, scale, px, name in sizes:
              fname = f"{name}.png"
              r = img.resize((px, px), Image.LANCZOS)
              bg = Image.new("RGB", (px, px), (255, 255, 255))
              bg.paste(r, mask=r.getchannel("A"))
              bg.save(os.path.join(folder, fname), "PNG")
              images.append({"idiom": idiom, "size": size, "scale": scale, "filename": fname})
              print(f"Created {fname} ({px}x{px})")
          contents = {"images": images, "info": {"version": 1, "author": "xcode"}}
          with open(os.path.join(folder, "Contents.json"), "w") as f:
              json.dump(contents, f, indent=2)
          print("Done - all 18 icons generated")
          PYEOF
          mkdir -p HafaUp/Base.lproj
          cat > HafaUp/Base.lproj/LaunchScreen.storyboard << 'LAUNCH'
          <?xml version="1.0" encoding="UTF-8"?>
          <document type="com.apple.InterfaceBuilder3.CocoaTouch.Storyboard.XIB" version="3.0" toolsVersion="17154" targetRuntime="iOS.CocoaTouch" propertyAccessControl="none" useAutolayout="YES" launchScreen="YES" useTraitCollections="YES" useSafeAreas="YES" colorMatched="YES" initialViewController="01J-lp-oVM">
              <device id="retina6_1" orientation="portrait" appearance="light"/>
              <dependencies>
                  <deployment identifier="iOS"/>
                  <plugIn identifier="com.apple.InterfaceBuilder.IBCocoaTouchPlugin" version="17124"/>
                  <capability name="Safe area layout guides" minToolsVersion="9.0"/>
                  <capability name="documents saved in the Xcode 8 format" minToolsVersion="8.0"/>
              </dependencies>
              <scenes>
                  <scene sceneID="EHf-IW-A2E">
                      <objects>
                          <viewController id="01J-lp-oVM" sceneMemberID="viewController">
                              <view key="view" contentMode="scaleToFill" id="Ze5-6b-2t3">
                                  <rect key="frame" x="0.0" y="0.0" width="414" height="896"/>
                                  <autoresizingMask key="autoresizingMask" widthSizable="YES" heightSizable="YES"/>
                                  <color key="backgroundColor" systemColor="systemBackgroundColor"/>
                                  <viewLayoutGuide key="safeArea" id="Bcu-3y-fUS"/>
                              </view>
                          </viewController>
                          <placeholder placeholderIdentifier="IBFirstResponder" id="iYj-Kq-Ea1" userLabel="First Responder" sceneMemberID="firstResponder"/>
                      </objects>
                      <point key="canvasLocation" x="140" y="129"/>
                  </scene>
              </scenes>
              <resources>
                  <systemColor name="systemBackgroundColor">
                      <color white="1" alpha="1" colorSpace="custom" customColorSpace="genericGamma22GrayColorSpace"/>
                  </systemColor>
              </resources>
          </document>
          LAUNCH
          cat > HafaUp/Base.lproj/Main.storyboard << 'MAIN'
          <?xml version="1.0" encoding="UTF-8"?>
          <document type="com.apple.InterfaceBuilder3.CocoaTouch.Storyboard.XIB" version="3.0" toolsVersion="17154" targetRuntime="iOS.CocoaTouch" propertyAccessControl="none" useAutolayout="YES" useTraitCollections="YES" useSafeAreas="YES" colorMatched="YES" initialViewController="BYZ-38-t0r">
              <device id="retina6_1" orientation="portrait" appearance="light"/>
              <dependencies>
                  <deployment identifier="iOS"/>
                  <plugIn identifier="com.apple.InterfaceBuilder.IBCocoaTouchPlugin" version="17124"/>
                  <capability name="Safe area layout guides" minToolsVersion="9.0"/>
                  <capability name="documents saved in the Xcode 8 format" minToolsVersion="8.0"/>
              </dependencies>
              <scenes>
                  <scene sceneID="tne-QT-ifu">
                      <objects>
                          <viewController id="BYZ-38-t0r" customClass="ViewController" customModule="HafaUp" customModuleProvider="target" sceneMemberID="viewController">
                              <view key="view" contentMode="scaleToFill" id="8bC-Xf-vdC">
                                  <rect key="frame" x="0.0" y="0.0" width="414" height="896"/>
                                  <autoresizingMask key="autoresizingMask" widthSizable="YES" heightSizable="YES"/>
                                  <subviews>
                                      <view contentMode="scaleToFill" translatesAutoresizingMaskIntoConstraints="NO" id="webviewView-id">
                                          <rect key="frame" x="0.0" y="0.0" width="414" height="896"/>
                                          <color key="backgroundColor" systemColor="systemBackgroundColor"/>
                                      </view>
                                      <view contentMode="scaleToFill" translatesAutoresizingMaskIntoConstraints="NO" id="loadingView-id">
                                          <rect key="frame" x="0.0" y="0.0" width="414" height="896"/>
                                          <subviews>
                                              <progressView opaque="NO" contentMode="scaleToFill" verticalHuggingPriority="750" translatesAutoresizingMaskIntoConstraints="NO" id="progressView-id">
                                                  <rect key="frame" x="0.0" y="44.0" width="414" height="4"/>
                                              </progressView>
                                              <imageView clipsSubviews="YES" userInteractionEnabled="NO" contentMode="scaleAspectFit" horizontalHuggingPriority="251" verticalHuggingPriority="251" translatesAutoresizingMaskIntoConstraints="NO" id="connectionProblem-id">
                                                  <rect key="frame" x="157" y="398" width="100" height="100"/>
                                                  <constraints>
                                                      <constraint firstAttribute="width" constant="100" id="w100"/>
                                                      <constraint firstAttribute="height" constant="100" id="h100"/>
                                                  </constraints>
                                              </imageView>
                                          </subviews>
                                          <color key="backgroundColor" red="1" green="0.976" blue="0.941" alpha="1" colorSpace="custom" customColorSpace="sRGB"/>
                                      </view>
                                  </subviews>
                                  <color key="backgroundColor" systemColor="systemBackgroundColor"/>
                                  <constraints>
                                      <constraint firstItem="webviewView-id" firstAttribute="top" secondItem="8bC-Xf-vdC" secondAttribute="top" id="c1"/>
                                      <constraint firstItem="webviewView-id" firstAttribute="leading" secondItem="8bC-Xf-vdC" secondAttribute="leading" id="c2"/>
                                      <constraint firstItem="webviewView-id" firstAttribute="trailing" secondItem="8bC-Xf-vdC" secondAttribute="trailing" id="c3"/>
                                      <constraint firstItem="webviewView-id" firstAttribute="bottom" secondItem="8bC-Xf-vdC" secondAttribute="bottom" id="c4"/>
                                      <constraint firstItem="loadingView-id" firstAttribute="top" secondItem="8bC-Xf-vdC" secondAttribute="top" id="c5"/>
                                      <constraint firstItem="loadingView-id" firstAttribute="leading" secondItem="8bC-Xf-vdC" secondAttribute="leading" id="c6"/>
                                      <constraint firstItem="loadingView-id" firstAttribute="trailing" secondItem="8bC-Xf-vdC" secondAttribute="trailing" id="c7"/>
                                      <constraint firstItem="loadingView-id" firstAttribute="bottom" secondItem="8bC-Xf-vdC" secondAttribute="bottom" id="c8"/>
                                      <constraint firstItem="progressView-id" firstAttribute="top" secondItem="6Tk-OE-BBY" secondAttribute="top" id="c9"/>
                                      <constraint firstItem="progressView-id" firstAttribute="leading" secondItem="loadingView-id" secondAttribute="leading" id="c10"/>
                                      <constraint firstItem="progressView-id" firstAttribute="trailing" secondItem="loadingView-id" secondAttribute="trailing" id="c11"/>
                                      <constraint firstItem="connectionProblem-id" firstAttribute="centerX" secondItem="loadingView-id" secondAttribute="centerX" id="c12"/>
                                      <constraint firstItem="connectionProblem-id" firstAttribute="centerY" secondItem="loadingView-id" secondAttribute="centerY" id="c13"/>
                                  </constraints>
                                  <viewLayoutGuide key="safeArea" id="6Tk-OE-BBY"/>
                              </view>
                              <connections>
                                  <outlet property="webviewView" destination="webviewView-id" id="o1"/>
                                  <outlet property="loadingView" destination="loadingView-id" id="o2"/>
                                  <outlet property="progressView" destination="progressView-id" id="o3"/>
                                  <outlet property="connectionProblemView" destination="connectionProblem-id" id="o4"/>
                              </connections>
                          </viewController>
                          <placeholder placeholderIdentifier="IBFirstResponder" id="dkx-z0-nzr" sceneMemberID="firstResponder"/>
                      </objects>
                      <point key="canvasLocation" x="140" y="129"/>
                  </scene>
              </scenes>
              <resources>
                  <systemColor name="systemBackgroundColor">
                      <color white="1" alpha="1" colorSpace="custom" customColorSpace="genericGamma22GrayColorSpace"/>
                  </systemColor>
              </resources>
          </document>
          MAIN
          cd "$CM_BUILD_DIR"
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "HafaUp.xcworkspace" \
            --scheme "HafaUp"
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
